server.name: kibana
server.host: "0.0.0.0"

elasticsearch.hosts: ["http://es01:9200"]
elasticsearch.username: "kibana_system"
elasticsearch.password: "${KIBANA_PASSWORD}"

xpack.encryptedSavedObjects.encryptionKey: "minha-chave-de-lab-com-32-caracteres"
xpack.reporting.encryptionKey: "minha-chave-report-com-32-caracteres"
xpack.security.encryptionKey: "minha-chave-seguranca-32-caracteres"

xpack.fleet.agents.elasticsearch.hosts: ["http://es01:9200"]
xpack.fleet.agents.fleet_server.hosts: ["http://fleet-server:8220"]

xpack.fleet.packages:
  - name: fleet_server
    version: latest
  - name: apm
    version: latest
  - name: system
    version: latest

xpack.fleet.agentPolicies:
  - name: Fleet Server + APM Policy
    id: fleet-server-apm-policy
    is_default_fleet_server: true
    is_managed: false
    namespace: default
    package_policies:
      - name: fleet-server-1
        package:
          name: fleet_server

      - name: apm-1
        package:
          name: apm
        inputs:
          - type: apm
            enabled: true
            vars:
              - name: host
                value: "0.0.0.0:8200"
              - name: url
                value: "http://localhost:8200"
              - name: secret_token
                value: "${APM_SECRET_TOKEN}"

      - name: system-1
        package:
          name: system