services:
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    command: >
      bash -c '
        echo "Aguardando Elasticsearch ficar disponível...";

        until curl -s -u elastic:${ELASTIC_PASSWORD} http://es01:9200 >/dev/null; do
          echo "Aguardando Elasticsearch...";
          sleep 5;
        done;

        echo "Configurando senha do usuario kibana_system...";

        until curl -s -u elastic:${ELASTIC_PASSWORD} -X POST "http://es01:9200/_security/user/kibana_system/_password" -H "Content-Type: application/json" -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do
          echo "Tentando configurar senha do kibana_system novamente...";
          sleep 5;
        done;

        echo "Setup concluído.";
      '
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      KIBANA_PASSWORD: ${KIBANA_PASSWORD}
    depends_on:
      es01:
        condition: service_healthy
    networks:
      - elastic
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    mem_limit: 2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - "9200"
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 60
    networks:
      - elastic

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      KIBANA_PASSWORD: ${KIBANA_PASSWORD}
      APM_SECRET_TOKEN: ${APM_SECRET_TOKEN}
    expose:
      - "5601"
    volumes:
      - ./kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 10s
      timeout: 10s
      retries: 60
    networks:
      - elastic

  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    user: root
    depends_on:
      kibana:
        condition: service_healthy
      es01:
        condition: service_healthy
    environment:
      - FLEET_SERVER_ENABLE=1
      - FLEET_SERVER_POLICY_ID=fleet-server-apm-policy
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://es01:9200
      - FLEET_SERVER_HOST=0.0.0.0
      - FLEET_SERVER_PORT=8220
      - FLEET_SERVER_INSECURE_HTTP=1

      - KIBANA_FLEET_SETUP=1
      - KIBANA_FLEET_HOST=http://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${ELASTIC_PASSWORD}

      - ELASTICSEARCH_HOST=http://es01:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}

      - FLEET_INSECURE=true
    expose:
      - "8220"
      - "8200"
    volumes:
      - fleetdata:/usr/share/elastic-agent/state
    networks:
      - elastic

volumes:
  esdata01:
  fleetdata:

networks:
  elastic:
